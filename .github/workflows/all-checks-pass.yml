name: All checks pass
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  allchecks:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
      actions: read
    steps:
      - uses: wechuli/allcheckspassed@v2
        with:
          ignore_superseded_runs: true
          delay: 5 # minutes

